<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Greek Reader</title>

<style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
}

#text {
  font-size: 24px;
  line-height: 1.6;
}

span {
  padding: 3px;
  cursor: pointer;
}

.active {
  background-color: yellow;
}
</style>
</head>

<body>

<h1>📖 Greek Reader (Test 2)</h1>

<!--input-->

audio =
text = 
time_stamp =
  
<!--actual code-->
  
<p id="text">
  <span data-start="2.2">Εἰσὶ</span>
  <span data-start="2.6">δὲ</span>
  <span data-start="2.8">τῶν</span>
  <span data-start="3.2">μύθων</span>
</p>

<audio id="audio" controls>
  <source src="audio/aristotle_test_audio.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("audio");
const words = document.querySelectorAll("#text span");

audio.addEventListener("timeupdate", () => {
  const time = audio.currentTime;

  words.forEach(word => {
    const start = parseFloat(word.dataset.start);

    // remove highlight by default
    word.classList.remove("active");

    // highlight if in time window (~0.5 sec)
    if (time >= start && time < start + 0.5) {
      word.classList.add("active");
    }
  });
});
</script>

</body>
</html>
